      - name: ndl_sources
        description: "NDLソース管理"

models:
  - name: consistency_checks
    description: "a3_consistency_check.pyの全ルールをdbt testとして移植"
    columns: []
    
  - name: stg_sed_parsed
    description: "成績(SED)データのStagingモデル。5馬券種の基礎ターゲット変数(target_win等)を生成する。"
    columns:
      - name: race_date
        description: "レース日付"
        tests:
          - not_null
      - name: race_key
        description: "レースキー"
        tests:
          - not_null
      - name: umaban
        description: "馬番"
        tests:
          - not_null
      - name: actual_rank
        description: "確定着順"
      - name: target_win
        description: "単勝ターゲット (1着)"
      - name: target_place
        description: "複勝ターゲット (3着以内)"
      - name: target_umatan
        description: "馬単ターゲット (2着以内)"
      - name: target_umaren
        description: "馬連ターゲット (2着以内)"
      - name: target_wide
        description: "ワイドターゲット (3着以内)"

tests:
  # R-WL: Feature Whitelist (ターゲット変数がfeatures viewに混入していないか)
  - name: test_no_target_leak_in_features
    description: "R-WL: actual_rank, is_winner, is_top3 が features view に存在しないことを確認"

  # R-SED: SED Isolation (学習データに事後情報が混入していないか)
  - name: test_sed_isolation
    description: "R-SED: 禁止されたSEDカラムがtraining poolに存在しないこと"

  # R-CHAIN: View Chain Integrity
  - name: test_training_pool_not_empty
    description: "R-CHAIN: training pool が 10,000行以上あること"

  # R-SOVEREIGN: No Kill
  - name: test_no_exit_calls
    description: "R-SOVEREIGN: exit()呼び出しがないこと (DB側は不要)"

  # R-PAYOUT: Payout Table
  - name: test_payouts_exist
    description: "R-PAYOUT: 配当データが存在すること"
